<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岳阳中考查分系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #e6f2ff; /* 浅蓝色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 82, 164, 0.15);
            width: 100%;
            max-width: 450px;
            border-top: 5px solid #0052a4; /* 顶部蓝色装饰条 */
        }
        h1 {
            text-align: center;
            color: #0052a4; /* 深蓝色标题 */
            margin-bottom: 30px;
            font-size: 24px;
            letter-spacing: 2px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #b3d4fc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #0052a4; }
        button {
            width: 100%;
            padding: 14px;
            background-color: #0052a4;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:hover { background-color: #003d7a; }
        
        /* 成绩展示区域 */
        .result-box {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background-color: #f0f7ff;
            border-radius: 8px;
            border: 1px dashed #0052a4;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dotted #cce0ff;
            font-size: 15px;
            color: #333;
        }
        .result-item:last-child { border-bottom: none; }
        .total-score {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #0052a4;
            font-size: 18px;
            font-weight: bold;
            color: #0052a4;
            display: flex;
            justify-content: space-between;
        }
        .error-msg {
            color: #d9363e;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>岳阳中考查分成绩</h1>
    
    <div class="form-group">
        <label for="studentName">姓名</label>
        <input type="text" id="studentName" placeholder="请输入姓名">
    </div>
    
    <div class="form-group">
        <label for="studentId">学籍号 <span style="font-weight:normal; color:#888;">(限19位，支持字母)</span></label>
        <input type="text" id="studentId" maxlength="19" placeholder="请输入19位学籍号">
        <div class="error-msg" id="idError">学籍号必须为19位字符（数字或字母）</div>
    </div>
    
    <button onclick="queryScore()">查 询 成 绩</button>

    <div class="result-box" id="resultBox">
        <!-- 成绩将在这里动态生成 -->
    </div>
</div>

<script>
    function queryScore() {
        const name = document.getElementById('studentName').value.trim();
        const id = document.getElementById('studentId').value.trim();
        const errorMsg = document.getElementById('idError');
        const resultBox = document.getElementById('resultBox');

        // 1. 基础校验
        if (!name) { alert('请输入姓名！'); return; }
        
        // 学籍号校验：必须是19位，且只能包含字母和数字
        const idRegex = /^[a-zA-Z0-9]{19}$/;
        if (!idRegex.test(id)) {
            errorMsg.style.display = 'block';
            resultBox.style.display = 'none';
            return;
        } else {
            errorMsg.style.display = 'none';
        }

        // 2. 随机生成成绩
        // 语文、数学满分120；其他满分100
        const subjects = [
            { name: '语文', max: 120 },
            { name: '数学', max: 120 },
            { name: '英语', max: 100 },
            { name: '化学', max: 100 },
            { name: '物理', max: 100 },
            { name: '历史', max: 100 },
            { name: '政治', max: 100 }
        ];

        let totalScore = 0;
        let htmlContent = '';

        subjects.forEach(sub => {
            // 生成随机分数，这里设定一个相对真实的区间，比如满分的60%~100%
            const minScore = Math.floor(sub.max * 0.6);
            const score = Math.floor(Math.random() * (sub.max - minScore + 1)) + minScore;
            totalScore += score;
            htmlContent += `
                <div class="result-item">
                    <span>${sub.name}</span>
                    <span>${score}</span>
                </div>
            `;
        });

        htmlContent += `
            <div class="total-score">
                <span>总分 (满分750)</span>
                <span>${totalScore}</span>
            </div>
        `;

        // 3. 展示成绩
        resultBox.innerHTML = htmlContent;
        resultBox.style.display = 'block';
    }

    // 限制学籍号输入框只能输入字母和数字
    document.getElementById('studentId').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^a-zA-Z0-9]/g, '');
    });
</script>

</body>
</html>
